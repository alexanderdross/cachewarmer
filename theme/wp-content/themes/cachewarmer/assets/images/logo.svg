<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background -->
  <rect width="120" height="120" rx="22" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="60" y1="0" x2="60" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d8faa"/>
      <stop offset="0.5" stop-color="#5a7d99"/>
      <stop offset="1" stop-color="#4a6d88"/>
    </linearGradient>
  </defs>
  <!-- Server rack bottom -->
  <rect x="22" y="72" width="76" height="14" rx="3" fill="#f0e8dc" stroke="#2a3040" stroke-width="3"/>
  <circle cx="33" cy="79" r="2" fill="#2a3040"/>
  <circle cx="39" cy="79" r="2" fill="#2a3040"/>
  <circle cx="45" cy="79" r="2" fill="#2a3040"/>
  <circle cx="51" cy="79" r="2" fill="#2a3040"/>
  <circle cx="69" cy="79" r="2" fill="#2a3040"/>
  <circle cx="75" cy="79" r="2" fill="#2a3040"/>
  <circle cx="81" cy="79" r="2" fill="#2a3040"/>
  <circle cx="87" cy="79" r="2" fill="#2a3040"/>
  <!-- Server rack top -->
  <rect x="22" y="55" width="76" height="14" rx="3" fill="#f0e8dc" stroke="#2a3040" stroke-width="3"/>
  <circle cx="33" cy="62" r="2" fill="#2a3040"/>
  <circle cx="39" cy="62" r="2" fill="#2a3040"/>
  <circle cx="45" cy="62" r="2" fill="#2a3040"/>
  <circle cx="51" cy="62" r="2" fill="#2a3040"/>
  <circle cx="69" cy="62" r="2" fill="#2a3040"/>
  <circle cx="75" cy="62" r="2" fill="#2a3040"/>
  <circle cx="81" cy="62" r="2" fill="#2a3040"/>
  <circle cx="87" cy="62" r="2" fill="#2a3040"/>
  <!-- Flame -->
  <path d="M60 70 C60 70, 54 82, 54 88 C54 92, 56.5 95, 60 95 C63.5 95, 66 92, 66 88 C66 82, 60 70, 60 70z" fill="#e8601c" stroke="#2a3040" stroke-width="2"/>
  <path d="M60 76 C60 76, 57 83, 57 86 C57 88.5, 58.3 90, 60 90 C61.7 90, 63 88.5, 63 86 C63 83, 60 76, 60 76z" fill="#f4a030"/>
  <!-- Rocket body -->
  <path d="M52 62 L52 38 C52 38, 52 22, 60 12 C68 22, 68 38, 68 38 L68 62z" fill="#f0e8dc" stroke="#2a3040" stroke-width="3" stroke-linejoin="round"/>
  <!-- Rocket nose cone -->
  <path d="M52 38 C52 38, 52 22, 60 12 C68 22, 68 38, 68 38" fill="#f0e8dc" stroke="#2a3040" stroke-width="3" stroke-linejoin="round"/>
  <!-- Rocket window -->
  <circle cx="60" cy="38" r="5" fill="#5a7d99" stroke="#2a3040" stroke-width="2.5"/>
  <circle cx="58.5" cy="36.5" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <!-- Rocket fins -->
  <path d="M52 56 L44 64 L44 68 L52 62z" fill="#f0e8dc" stroke="#2a3040" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M68 56 L76 64 L76 68 L68 62z" fill="#f0e8dc" stroke="#2a3040" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Rocket center line -->
  <line x1="60" y1="45" x2="60" y2="62" stroke="#2a3040" stroke-width="2"/>
  <!-- Rocket cross strut -->
  <line x1="54" y1="56" x2="66" y2="56" stroke="#2a3040" stroke-width="2"/>
</svg>
