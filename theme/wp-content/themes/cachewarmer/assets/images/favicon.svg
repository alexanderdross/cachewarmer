  <path d="M16 19 C16 19, 14.2 22.5, 14.2 24 C14.2 25.2, 15 26, 16 26 C17 26, 17.8 25.2, 17.8 24 C17.8 22.5, 16 19, 16 19z" fill="#e8601c" stroke="#2a3040" stroke-width="0.5"/>
