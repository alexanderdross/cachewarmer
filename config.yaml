server:
  port: 3000
  host: "0.0.0.0"
  apiKey: "change-me-in-production"

redis:
  host: "localhost"
  port: 6379

database:
  path: "./data/cachewarmer.db"

puppeteer:
  executablePath: "/usr/bin/chromium-browser"
  headless: true
  args:
    - "--no-sandbox"
    - "--disable-setuid-sandbox"
    - "--disable-dev-shm-usage"

cdnWarming:
  enabled: true
  concurrency: 3
  waitUntil: "networkidle0"
  timeout: 30000
  userAgents:
    desktop: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    mobile: "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1"

facebook:
  enabled: true
  appId: ""
  appSecret: ""
  rateLimitPerSecond: 10

linkedin:
  enabled: true
  sessionCookie: ""
  concurrency: 1
  delayBetweenRequests: 5000

twitter:
  enabled: true
  concurrency: 2
  delayBetweenRequests: 3000
  timeout: 15000

google:
  enabled: true
  serviceAccountKeyFile: "./credentials/google-sa-key.json"
  dailyQuota: 200

bing:
  enabled: true
  apiKey: ""
  dailyQuota: 10000

indexNow:
  enabled: true
  key: ""
  keyLocation: ""

scheduler:
  enabled: false
  defaultCron: "0 3 * * *"

notifications:
  webhookUrl: ""
  emailEnabled: false
  emailTo: ""
  emailFrom: "cachewarmer@localhost"
  smtpHost: ""
  smtpPort: 587
  smtpUser: ""
  smtpPass: ""

excludePatterns: ""

logging:
  level: "info"
  file: "./data/cachewarmer.log"
